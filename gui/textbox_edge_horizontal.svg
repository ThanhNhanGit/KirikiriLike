<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1280"
     height="4"
     viewBox="0 0 1280 4"
     preserveAspectRatio="none">
  <defs>
    <!--
      The sides deliberately retain 55% alpha at the screen boundary. This
      lets the feather continue beyond the clipped viewport instead of ending
      in fully transparent gutters inside it.
    -->
    <linearGradient id="textbox-horizontal-edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="7%" stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="14%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="86%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="93%" stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="4" fill="url(#textbox-horizontal-edge)"/>
</svg>
